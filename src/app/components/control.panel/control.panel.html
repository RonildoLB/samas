<div class="container">

  <!-- Luz conectado -->
  <div class="light" [class.on]="connected">Conectado</div>

  <!-- Luz ligado -->
  <div class="light" [class.on]="ledOn">Ligado</div>

  <button (click)="connect()" class="btn">
    Conectar
  </button>

  <button (click)="turnOn()" class="btn">
    Ligar
  </button>

  <button (click)="turnOff()" class="btn">
    Desligar
  </button>

</div>
